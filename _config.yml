title: CyberHeisen
description: "Penetration testing notes, CTF walkthroughs, and security research."
baseurl: ""
url: "https://cyberheisen.github.io"

author:
  name: CyberHeisen
  twitter: CyberHeisen
  github: cyberheisen

# Build settings
# Theme is handled via custom _layouts — no gem theme needed
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Syntax highlighting
highlighter: rouge
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Permalink structure
permalink: /:year/:month/:day/:title/

# Front matter defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .github
  - vendor
  - _resources
